name: Shax Ultimate Hybrid Build

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Frontend Build
        run: |
          if [ -d "web" ]; then
            cd web
            npm install --legacy-peer-deps || echo "Install failed"
            npm run build || echo "Build failed, continuing anyway"
          else
            echo "Web papkasi topilmadi!"
          fi

      - name: GitHub Pages-ga yuklash
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/build
          keep_files: true
      
