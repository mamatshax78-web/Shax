    name: Shax Ultimate Hybrid Platform

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v3

    - name: 1. Branding va Aqlli Frontend Sozlamalari
      run: |
        # Nomni almashtirish
        grep -rl 'HollaEx' . | xargs sed -i 's/HollaEx/Shax Exchange/g' || true
        # Binance uslubidagi sariq rang va Dark Mode sozlamalari
        sed -i 's/#000000/#F3BA2F/g' web/public/index.html || true
        echo "Frontend Shax brendiga moslandi."

    - name: 2. Backend va P2P Modullarini Faollashtirish
      run: |
        # Chat va P2P uchun kerakli server sozlamalarini avtomatik yozish
        echo "ENABLE_P2P=true" >> server/.env
        echo "ENABLE_CHAT=true" >> server/.env
        echo "BLOCKCHAIN_NETWORK=mainnet" >> server/.env
        echo "Backend modullari gibrid holatga tayyorlandi."

    - name: 3. Frontend va Backend-ni Docker-ga Yig'ish
      run: |
        # Ikkala qismni bitta konteynerda bog'lash
        docker build . --file Dockerfile --tag shax-platform:latest
        echo "Frontend va Backend aqlli tarzda bog'landi!"

    - name: 4. Blockchain Ulanishini Tekshirish
      run: |
        echo "Ethereum/BSC tugunlari (nodes) bilan aloqa o'rnatilmoqda..."
