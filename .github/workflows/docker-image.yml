name: Shax Full Build Fix

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Platform
        run: |
          cd web
          npm install --legacy-peer-deps
          npm run build
          # Build natijasini tekshirish
          if [ -d "dist" ]; then echo "Dist folder exists"; fi
          if [ -d "build" ]; then echo "Build folder exists"; fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/build
          publish_branch: gh-pages
      
