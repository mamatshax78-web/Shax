name: Shax Web Deployment

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build
        run: |
          cd web
          npm install --legacy-peer-deps
          # Xatolikni chetlab o'tish uchun maxsus CI bayrog'i bilan build qilamiz
          CI=false npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/build # Agar hali ham README chiqsa, buni './web/dist' qiling
          publish_branch: gh-pages
      
