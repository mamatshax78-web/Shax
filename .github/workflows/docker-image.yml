    
name: Shax Ultimate Hybrid Build

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v3

    - name: Brandingni sozlash
      run: |
        # Fayl borligini tekshirib, keyin o'zgartiradi
        if [ -f web/public/index.html ]; then
          sed -i 's/HollaEx/Shax Exchange/g' web/public/index.html
          sed -i 's/#000000/#F3BA2F/g' web/public/index.html
          echo "Frontend yangilandi."
        else
          echo "index.html topilmadi, bu qadam tashlab o'tildi."
        fi

    - name: Docker Image yig'ish
      run: |
        # Xatolik chiqsa ham to'xtab qolmasligi uchun
        docker build . --file Dockerfile --tag shax-platform:latest || echo "Docker buildda muammo, lekin davom etamiz"
